---
deployment:
  tasks:
    - "echo '=== Ndauwo Deployment: Starting ==='"
    - "echo '[1/7] Creating .env from .env.example if missing...'"
    - "test -f .env || cp .env.example .env"
    - "echo '[2/7] Installing Composer dependencies...'"
    - "/usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction 2>&1"
    - "echo '[3/7] Generating application key...'"
    - "/usr/local/bin/php artisan key:generate --force --no-interaction 2>&1"
    - "echo '[4/7] Running database migrations...'"
    - "/usr/local/bin/php artisan migrate --force --no-interaction 2>&1"
    - "echo '[5/7] Running Laravel optimize...'"
    - "/usr/local/bin/php artisan optimize --no-interaction 2>&1"
    - "echo '[6/7] Caching config, routes, and views...'"
    - "/usr/local/bin/php artisan config:cache 2>&1"
    - "/usr/local/bin/php artisan route:cache 2>&1"
    - "/usr/local/bin/php artisan view:cache 2>&1"
    - "echo '[7/7] Deployment complete!'"
    - "echo '=== Ndauwo deployed successfully ==='"
    - "echo ''"
    - "echo 'Default database: SQLite (works out of the box — no config needed)'"
    - "echo 'To use MySQL instead, edit .env and set DB_CONNECTION=mysql + credentials'"
    - "echo "Make sure APP_URL=https://ndauwosafaris.com in .env""
    - "echo 'Then run: php artisan config:cache'"
